# ==============================================================================
# 基础配置文件
# ==============================================================================

# 项目基本信息
project:
  name: "ECG-LM"
  version: "1.0.0"
  description: "基于大模型的心电信号处理算法"

# 数据配置
data:
  # 数据路径
  root_dir: "D:/trae_ECG_llm_v1.0/data"
  train_dir: "D:/trae_ECG_llm_v1.0/data/train"
  val_dir: "D:/trae_ECG_llm_v1.0/data/val"
  test_dir: "D:/trae_ECG_llm_v1.0/data/test"
  
  # 数据集参数
  num_leads: 12              # 导联数 (12导联)
  sampling_rate: 500         # 采样率 Hz
  sequence_length: 5000      # 序列长度 (10秒)
  classes:
    - Normal                # 正常
    - AFib                  # 房颤
    - AFL                   # 心房扑动
    - SVT                   # 室上性心动过速
    - VT                    # 室性心动过速
    - PVC                   # 室性早搏
    - PAC                   # 房性早搏
    - LBBB                  # 左束支传导阻滞
    - RBBB                  # 右束支传导阻滞
    - Brady                 # 心动过缓
    - Tachy                 # 心动过速
    - MI                    # 心肌梗死
  
  num_classes: 12

# 模型配置
model:
  name: "ECGTransformer"
  
  # 输入配置
  input_channels: 12
  input_length: 5000
  
  # Transformer配置
  d_model: 256               # 模型维度
  num_heads: 8               # 注意力头数
  num_layers: 12             # Transformer层数
  d_ff: 1024                # 前馈网络维度
  dropout: 0.1
  max_seq_len: 5000
  
  # 卷积特征提取器
  conv_channels: [64, 128, 256]
  kernel_sizes: [5, 3, 3]
  
  # 预训练相关
  pretrain:
    masked_ratio: 0.15      # 掩码比例
    temperature: 0.1        # 对比学习温度系数

# 训练配置
training:
  # 基础参数
  batch_size: 16
  num_epochs: 100
  learning_rate: 1e-4
  weight_decay: 1e-5
  
  # 优化器
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  warmup_epochs: 5
  
  # 损失函数权重
  loss_weights:
    classification: 1.0
    detection: 0.5
    contrastive: 0.1
  
  # 早停
  early_stopping:
    patience: 15
    min_delta: 0.001

# 预处理配置
preprocessing:
  # 滤波参数
  filter:
    lowcut: 0.5              # 低频截止 Hz
    highcut: 50             # 高频截止 Hz
    notch_freq: 50          # 工频陷波 Hz
  
  # 归一化
  normalize: "zscore"        # zscore / minmax
  
  # 数据增强
  augmentation:
    enabled: true
    noise_level: 0.05
    shift_max: 100
    scale_range: [0.9, 1.1]
    dropout_prob: 0.1

# 评估配置
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc
    - sensitivity
    - specificity
  
  # 类别权重 (用于不平衡数据)
  class_weights: "balanced"

# 推理配置
inference:
  batch_size: 1
  device: "cuda"
  use_fp16: false
  confidence_threshold: 0.5

# 系统配置
system:
  seed: 42
  num_workers: 4
  pin_memory: true
  gradient_accumulation_steps: 4
  
  # 分布式训练
  distributed: false
  world_size: 1
  
  # 路径配置
  log_dir: "D:/trae_ECG_llm_v1.0/logs"
  checkpoint_dir: "D:/trae_ECG_llm_v1.0/checkpoints"
  output_dir: "D:/trae_ECG_llm_v1.0/outputs"
